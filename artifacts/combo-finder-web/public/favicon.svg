  <path d="M44 14 A22 22 0 1 0 44 50" stroke="#2563eb" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- Phone body -->
  <rect x="25" y="20" width="14" height="22" rx="3" fill="#2563eb"/>
  <!-- Phone screen -->
  <rect x="27" y="22" width="10" height="16" rx="1.5" fill="#0f1b2d"/>
  <!-- Phone home dot -->
  <circle cx="32" cy="40.5" r="1.2" fill="#2563eb"/>
  <!-- Magnifier circle -->
  <circle cx="36" cy="36" r="5" stroke="white" stroke-width="2.5" fill="none"/>
  <!-- Magnifier handle -->
