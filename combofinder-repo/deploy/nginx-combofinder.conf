server {
    listen 80;
    server_name combofinder.iunlockd.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name combofinder.iunlockd.com;

    ssl_certificate /etc/letsencrypt/live/combofinder.iunlockd.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/combofinder.iunlockd.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # ── Admin Panel at /admin/ ───────────────────────────────────────────
    location /admin/ {
        alias /var/www/combofinder/admin/;
        index index.html;

        # index.html — never cache (JS assets have content-hash names so they're safe to cache)
        location ~* /admin/index\.html$ {
            alias /var/www/combofinder/admin/index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # Hashed JS/CSS assets — cache aggressively (they change name on each build)
        location ~* /admin/assets/ {
            alias /var/www/combofinder/admin/assets/;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        try_files $uri $uri/ @admin_fallback;
    }

    location @admin_fallback {
        root /var/www/combofinder;
        try_files /admin/index.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ── API at /api/ ────────────────────────────────────────────────────
    location /api {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # ── User Web App at / ────────────────────────────────────────────────
    location / {
        root /var/www/combofinder/web/;
        index index.html;

        # index.html — never cache
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # Hashed assets — immutable cache
        location ~* ^/assets/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        try_files $uri $uri/ /index.html;
    }
}
