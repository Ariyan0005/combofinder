<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Blue rounded square -->
  <rect width="64" height="64" rx="12" fill="#2563eb"/>
  <!-- Phone outline (white) -->
  <rect x="16" y="6" width="32" height="48" rx="6" fill="white"/>
  <!-- Screen area (blue) -->
  <rect x="20" y="11" width="24" height="34" rx="2" fill="#2563eb"/>
  <!-- Home button -->
  <circle cx="32" cy="50" r="3" fill="#2563eb"/>
  <!-- Magnifier over screen -->
  <circle cx="36" cy="27" r="8" fill="none" stroke="white" stroke-width="3"/>
  <circle cx="36" cy="27" r="3.5" fill="none" stroke="white" stroke-width="2.5"/>
  <line x1="42" y1="33" x2="47" y2="38" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
</svg>
