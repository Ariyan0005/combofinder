# ComboFinder - Nginx Configuration
# এই ফাইলটি /etc/nginx/sites-available/combofinder তে রাখুন
#
# yourdomain.com এর জায়গায় আপনার আসল domain দিন
# উদাহরণ: admin.example.com

server {
    listen 80;
    server_name admin.yourdomain.com;

    # Admin Panel - static files
    root /var/www/combofinder/admin;
    index index.html;

    # React Router support (page refresh করলে 404 না হওয়ার জন্য)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API requests - Node.js server এ পাঠানো
    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
