server {
    listen 80;
    server_name combofinder.iunlockd.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name combofinder.iunlockd.com;

    ssl_certificate /etc/letsencrypt/live/combofinder.iunlockd.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/combofinder.iunlockd.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Admin Panel at /admin/
    location /admin/ {
        alias /var/www/combofinder/admin/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    # API at /api/
    location /api {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # User Web App at /
    location / {
        root /var/www/combofinder/web/;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
